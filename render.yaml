# Render Blueprint for VoltEdge EV Store
# Deploys the web app. Storage is durable when DATABASE_URL is set (any
# PostgreSQL, e.g. a free Neon database); otherwise it uses local JSON files.
#
# NOTE: Render's free plan allows only ONE free database per account. If you
# already have one, do NOT let this Blueprint create another. Instead set
# DATABASE_URL in the service's Environment tab (Neon free Postgres works great).
services:
  - type: web
    name: voltedge
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node backend/server.js
    envVars:
      - key: ADMIN_SECRET
        generateValue: true
      # For permanent storage, add DATABASE_URL in the dashboard (Environment
      # tab) using a free Neon PostgreSQL connection string. The app creates its
      # tables automatically and then survives restarts/redeploys.
