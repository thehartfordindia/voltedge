# Render Blueprint for VoltEdge EV Store
# Deploys BOTH the web app and a free PostgreSQL database, wired together
# automatically. In the Render dashboard: New + -> Blueprint -> pick this repo.
services:
  - type: web
    name: voltedge
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node backend/server.js
    envVars:
      - key: ADMIN_SECRET
        generateValue: true
      # Durable storage: connection string is injected automatically from the
      # free PostgreSQL database defined below. Users, orders, reviews and
      # sessions are then saved permanently (survive restarts/redeploys).
      - key: DATABASE_URL
        fromDatabase:
          name: voltedge-db
          property: connectionString

databases:
  - name: voltedge-db
    plan: free
    databaseName: voltedge
    user: voltedge
